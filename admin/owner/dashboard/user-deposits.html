<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Deposits</title>
    <link rel="stylesheet" href="/admin/owner/dashboard/css/layout.css" />
    <link rel="icon" href="/assets/images/logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "DM Sans", sans-serif;
      }
      .page-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        margin-top: 25px;
        margin-bottom: 50px;
      }
      .page-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        width: 90%;
        /* max-width: 1400px; */
        margin: 40px 0 1.5rem;
      }
      .page-head h1 {
        margin: 0;
        font-size: 1.6rem;
        font-weight: 600;
        color: #111827;
      }
      .page-head p {
        margin: 5px 0 0;
        color: #6b7280;
        font-size: 0.875rem;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        width: 90%;
        /* max-width: 1100px; */
        overflow: hidden;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
      }
      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.1rem 1.5rem;
        border-bottom: 1px solid #e5e7eb;
        background: #f9fafb;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .user-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: #eff6ff;
        color: #1d4ed8;
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 500;
      }
      .count-pill {
        background: #f3f4f6;
        color: #6b7280;
        padding: 0.3rem 0.75rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 500;
      }
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }
      thead tr {
        background: #f8fafc;
        border-bottom: 1px solid #e5e7eb;
      }
      th {
        padding: 0.75rem 1.25rem;
        text-align: left;
        font-size: 0.72rem;
        font-weight: 600;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
      }
      td {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid #f3f4f6;
        color: #374151;
        vertical-align: middle;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      tbody tr:hover td {
        background: #fafafa;
      }
      .amount-cell {
        font-size: 0.95rem;
        font-weight: 600;
        color: #111827;
      }
      .amount-cell span {
        font-size: 0.75rem;
        font-weight: 400;
        color: #9ca3af;
        margin-left: 2px;
      }
      .txid {
        font-family: "Courier New", monospace;
        font-size: 0.78rem;
        color: #6b7280;
        background: #f3f4f6;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        max-width: 160px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        display: inline-block;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.28rem 0.7rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        white-space: nowrap;
      }
      .badge::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        display: inline-block;
      }
      .badge-pending {
        background: #fef3c7;
        color: #92400e;
      }
      .badge-pending::before {
        background: #f59e0b;
      }
      .badge-approved {
        background: #d1fae5;
        color: #065f46;
      }
      .badge-approved::before {
        background: #10b981;
      }
      .badge-rejected {
        background: #fee2e2;
        color: #991b1b;
      }
      .badge-rejected::before {
        background: #ef4444;
      }
      .action-cell {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        min-width: 120px;
      }
      .btn {
        padding: 0.4rem 0.85rem;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 0.78rem;
        font-weight: 600;
        font-family: inherit;
        transition: all 0.18s;
        text-align: center;
        width: 100%;
      }
      .btn-approve {
        background: #ecfdf5;
        color: #065f46;
        border: 1px solid #6ee7b7;
      }
      .btn-approve:hover {
        background: #10b981;
        color: #fff;
        border-color: #10b981;
      }
      .btn-deny {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fca5a5;
      }
      .btn-deny:hover {
        background: #ef4444;
        color: #fff;
        border-color: #ef4444;
      }
      .btn-pending {
        background: #fefce8;
        color: #92400e;
        border: 1px solid #fde68a;
      }
      .btn-pending:hover {
        background: #f59e0b;
        color: #fff;
        border-color: #f59e0b;
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid #d1d5db;
        color: #374151;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.5rem 1.1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-ghost:hover {
        background: #f3f4f6;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .empty {
        text-align: center;
        padding: 3.5rem;
        color: #9ca3af;
        font-size: 0.9rem;
      }
      .toast-container {
        position: fixed;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .toast {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.85rem 1.2rem;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 500;
        min-width: 280px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
        animation: slideIn 0.25s ease;
      }
      .toast.success {
        background: #d1fae5;
        color: #065f46;
        border-left: 4px solid #10b981;
      }
      .toast.error {
        background: #fee2e2;
        color: #991b1b;
        border-left: 4px solid #ef4444;
      }
      .toast.warning {
        background: #fef3c7;
        color: #92400e;
        border-left: 4px solid #f59e0b;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
        animation: fadeIn 0.2s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .dialog {
        background: #fff;
        border-radius: 12px;
        padding: 2rem;
        max-width: 420px;
        width: 90%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      }
      .dialog h3 {
        margin: 0 0 0.5rem;
        font-size: 1.1rem;
        color: #111827;
      }
      .dialog p {
        margin: 0 0 1.25rem;
        color: #6b7280;
        font-size: 0.875rem;
      }
      .dialog input {
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: 1.5px solid #e5e7eb;
        border-radius: 7px;
        font-size: 0.875rem;
        font-family: inherit;
        outline: none;
        margin-bottom: 1.25rem;
        transition: border-color 0.2s;
      }
      .dialog input:focus {
        border-color: #2563eb;
      }
      .dialog-actions {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }
      .btn-modal-cancel {
        padding: 0.55rem 1.1rem;
        border-radius: 7px;
        border: 1px solid #e5e7eb;
        background: #fff;
        color: #6b7280;
        font-size: 0.875rem;
        font-family: inherit;
        font-weight: 500;
        cursor: pointer;
      }
      .btn-modal-cancel:hover {
        background: #f9fafb;
      }
      .btn-modal-approve {
        padding: 0.55rem 1.25rem;
        border-radius: 7px;
        border: none;
        background: #10b981;
        color: #fff;
        font-size: 0.875rem;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-modal-approve:hover {
        background: #059669;
      }
      .btn-modal-reject {
        padding: 0.55rem 1.25rem;
        border-radius: 7px;
        border: none;
        background: #ef4444;
        color: #fff;
        font-size: 0.875rem;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-modal-reject:hover {
        background: #b91c1c;
      }
    </style>
  </head>

  <body>
    <div class="toast-container" id="toast-container"></div>
    <header id="topnav-mount"></header>

    <div class="page-wrap">
      <div class="page-head">
        <div>
          <h1>User Deposits</h1>
          <p>Review and manage deposit requests for this user.</p>
        </div>
        <button onclick="history.back()" class="btn-ghost">← Back</button>
      </div>

      <div class="card">
        <div class="card-head">
          <span class="user-pill" id="userPill">Loading...</span>
          <span class="count-pill" id="countText"></span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Transaction ID</th>
                <th>Coin / Method</th>
                <th>Wallet Address</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="depositsTbody">
              <tr>
                <td colspan="7" class="empty">Loading deposits...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const userId = new URLSearchParams(window.location.search).get("userId");

      function showToast(type, message) {
        const container = document.getElementById("toast-container");
        const t = document.createElement("div");
        t.className = `toast ${type}`;
        const icons = { success: "✅", error: "❌", warning: "⚠️" };
        t.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
        container.appendChild(t);
        setTimeout(() => t.remove(), 3500);
      }

      function esc(str) {
        return String(str ?? "").replace(
          /[&<>"']/g,
          (m) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#039;",
            })[m],
        );
      }

      function statusBadge(s) {
        return `<span class="badge badge-${s}">${s.charAt(0).toUpperCase() + s.slice(1)}</span>`;
      }

      function formatDate(d) {
        if (!d) return "—";
        const date = new Date(d);
        return (
          date.toLocaleDateString("en-US", {
            month: "short",
            day: "numeric",
            year: "numeric",
          }) +
          " · " +
          date.toLocaleTimeString("en-US", {
            hour: "2-digit",
            minute: "2-digit",
          })
        );
      }

      // Build action buttons based on current status
      function actionButtons(d) {
        const id = d._id;
        const s = d.status;

        const approve = `<button class="btn btn-approve" onclick="openApproveModal('${id}')">✓ Approve</button>`;
        const reject = `<button class="btn btn-deny"    onclick="openRejectModal('${id}')">✕ Reject</button>`;
        const pending = `<button class="btn btn-pending" onclick="openPendingModal('${id}')">↩ Set Pending</button>`;
        const del = `<button class="btn btn-deny"    onclick="openDeleteModal('${id}')" style="background:#fdf2f8;color:#7e1d4e;border:1px solid #f0abcb;">🗑 Delete</button>`;

        if (s === "pending")
          return `<div class="action-cell">${approve}${reject}${del}</div>`;
        if (s === "approved")
          return `<div class="action-cell">${reject}${pending}${del}</div>`;
        if (s === "rejected")
          return `<div class="action-cell">${approve}${pending}${del}</div>`;

        return `<div class="action-cell">${del}</div>`;
      }

      // ----------- Delete User ------------//
      // ── Delete Modal ──
      let deleteTarget = null;
      function openDeleteModal(id) {
        deleteTarget = id;
        const overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.id = "deleteOverlay";
        overlay.innerHTML = `
    <div class="dialog">
      <h3>Delete Deposit</h3>
      <p>⚠️ This will permanently delete this deposit record. This action cannot be undone. Are you absolutely sure?</p>
      <div class="dialog-actions">
        <button onclick="closeDeleteModal()" class="btn-modal-cancel">Cancel</button>
        <button onclick="submitDelete()" class="btn-modal-reject">Yes, Delete</button>
      </div>
    </div>`;
        document.body.appendChild(overlay);
      }
      function closeDeleteModal() {
        document.getElementById("deleteOverlay")?.remove();
      }
      async function submitDelete() {
        try {
          const res = await fetch(`/api/admin/deposits/delete/${deleteTarget}`, {
            method: "DELETE",
            credentials: "include",
          });
          const { success, message } = await res.json();
          if (!success) throw new Error(message);
          showToast("success", "Deposit deleted successfully");
          document.getElementById("deleteOverlay")?.remove();
          loadDeposits();
        } catch (err) {
          showToast("error", err.message || "Failed to delete deposit");
        }
      }

      // --------- Load User ---------//
      async function loadUser() {
        if (!userId) return;
        try {
          const res = await fetch(`/api/admin/users/${userId}`, {
            credentials: "include",
          });
          const { success, user } = await res.json();
          if (!success) throw new Error();
          document.getElementById("userPill").textContent =
            `👤 ${user.name}  •  ${user.email}`;
        } catch {
          document.getElementById("userPill").textContent = "Unknown user";
        }
      }

      async function loadDeposits() {
        try {
          const res = await fetch(`/api/admin/deposits/user/${userId}`, {
            credentials: "include",
          });
          const { success, deposits } = await res.json();
          if (!success) throw new Error();

          document.getElementById("countText").textContent =
            `${deposits.length} deposit${deposits.length !== 1 ? "s" : ""}`;

          const tbody = document.getElementById("depositsTbody");
          if (!deposits.length) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty">No deposits found for this user.</td></tr>`;
            return;
          }

          tbody.innerHTML = deposits
            .map(
              (d) => `
            <tr>
              <td style="white-space:nowrap;color:#6b7280;font-size:0.82rem;">${formatDate(d.createdAt)}</td>
              <td>
                <div class="amount-cell">$${Number(d.amount).toLocaleString("en-US", { minimumFractionDigits: 2 })}<span>USD</span></div>
              </td>
              <td><span class="txid" title="${esc(d.transactionId)}">${esc(d.transactionId || "—")}</span></td>
              <td style="font-size:0.82rem;">${esc(d.paymentMethod || "—")}</td>
              <td><span class="txid" title="${esc(d.walletAddress)}">${esc(d.walletAddress || "—")}</span></td>
              <td>${statusBadge(d.status)}</td>
              <td>${actionButtons(d)}</td>
            </tr>
          `,
            )
            .join("");
        } catch {
          document.getElementById("depositsTbody").innerHTML =
            `<tr><td colspan="7" class="empty">Failed to load deposits.</td></tr>`;
        }
      }

      // ── Approve Modal ──
      let approveTarget = null;
      function openApproveModal(id) {
        approveTarget = id;
        const overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.id = "approveOverlay";
        overlay.innerHTML = `
          <div class="dialog">
            <h3>Approve Deposit</h3>
            <p>This will credit the amount to the user's balance. Are you sure?</p>
            <div class="dialog-actions">
              <button onclick="closeApproveModal()" class="btn-modal-cancel">Cancel</button>
              <button onclick="submitApprove()" class="btn-modal-approve">Yes, Approve</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
      }
      function closeApproveModal() {
        document.getElementById("approveOverlay")?.remove();
      }
      async function submitApprove() {
        try {
          const res = await fetch(
            `/api/admin/deposits/${approveTarget}/approve`,
            {
              method: "PATCH",
              credentials: "include",
            },
          );
          const { success, message } = await res.json();
          if (!success) throw new Error(message);
          showToast("success", "Deposit approved successfully");
          closeApproveModal();
          loadDeposits();
        } catch (err) {
          showToast("error", err.message || "Failed to approve deposit");
        }
      }

      // ── Reject Modal ──
      let rejectTarget = null;
      function openRejectModal(id) {
        rejectTarget = id;
        const overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.id = "rejectOverlay";
        overlay.innerHTML = `
          <div class="dialog">
            <h3>Reject Deposit</h3>
            <p>Provide a reason — this will be stored on the record.</p>
            <input type="text" id="rejectReasonInput" placeholder="e.g. Invalid transaction ID..." />
            <div class="dialog-actions">
              <button onclick="closeRejectModal()" class="btn-modal-cancel">Cancel</button>
              <button onclick="submitReject()" class="btn-modal-reject">Reject</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
      }
      function closeRejectModal() {
        document.getElementById("rejectOverlay")?.remove();
      }
      async function submitReject() {
        const reason = document
          .getElementById("rejectReasonInput")
          .value.trim();
        if (!reason)
          return showToast("warning", "Please provide a rejection reason");
        try {
          const res = await fetch(
            `/api/admin/deposits/${rejectTarget}/reject`,
            {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ rejectionReason: reason }),
            },
          );
          const { success, message } = await res.json();
          if (!success) throw new Error(message);
          showToast("success", "Deposit rejected");
          closeRejectModal();
          loadDeposits();
        } catch (err) {
          showToast("error", err.message || "Failed to reject deposit");
        }
      }

      // ── Set Pending Modal ──
      let pendingTarget = null;
      function openPendingModal(id) {
        pendingTarget = id;
        const overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.id = "pendingOverlay";
        overlay.innerHTML = `
          <div class="dialog">
            <h3>Set Back to Pending</h3>
            <p>This will reverse the current status. Any balance changes will be undone.</p>
            <div class="dialog-actions">
              <button onclick="closePendingModal()" class="btn-modal-cancel">Cancel</button>
              <button onclick="submitPending()" class="btn-modal-approve" style="background:#f59e0b;">Yes, Set Pending</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
      }
      function closePendingModal() {
        document.getElementById("pendingOverlay")?.remove();
      }
      async function submitPending() {
        try {
          const res = await fetch(
            `/api/admin/deposits/${pendingTarget}/pending`,
            {
              method: "PATCH",
              credentials: "include",
            },
          );
          const { success, message } = await res.json();
          if (!success) throw new Error(message);
          showToast("success", "Deposit set back to pending.");
          closePendingModal();
          loadDeposits();
        } catch (err) {
          showToast("error", err.message || "Failed to update deposit");
        }
      }

      loadUser();
      loadDeposits();
    </script>

    <script src="/admin-script/admin-auth-required.js"></script>
    <script src="/admin-script/admin-logout.js"></script>
    <script src="/admin-script/admin-layout.js"></script>
  </body>
</html>
