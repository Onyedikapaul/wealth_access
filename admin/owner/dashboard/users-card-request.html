<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Card Requests | Admin Dashboard</title>
    <link rel="icon" href="/assets/images/logo.png" />
    <link rel="stylesheet" href="/admin/owner/dashboard/css/layout.css" />
    <style>
      /* ── Page vars ── */
      :root {
        --navy: #0f172a;
        --navy2: #1e293b;
        --gold: #f59e0b;
        --gold2: #d97706;
        --green: #10b981;
        --red: #ef4444;
        --blue: #3b82f6;
        --muted: #64748b;
        --border: #e2e8f0;
        --card: #ffffff;
        --bg: #f8fafc;
        --text: #0f172a;
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      button * {
        pointer-events: none;
      }

      /* ── Toast ── */
      .toast-wrap {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .toast {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
        padding: 14px 16px;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        min-width: 280px;
        max-width: 380px;
        border-left: 4px solid;
        animation: tIn 0.3s ease;
      }
      .toast.success {
        border-left-color: #10b981;
      }
      .toast.error {
        border-left-color: #ef4444;
      }
      .toast.info {
        border-left-color: #3b82f6;
      }
      .toast-icon {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .toast.success .toast-icon {
        background: #d1fae5;
        color: #059669;
      }
      .toast.error .toast-icon {
        background: #fee2e2;
        color: #dc2626;
      }
      .toast.info .toast-icon {
        background: #dbeafe;
        color: #2563eb;
      }
      .toast-body {
        flex: 1;
      }
      .toast-title {
        font-weight: 700;
        font-size: 13px;
        color: #0f172a;
      }
      .toast-msg {
        font-size: 12px;
        color: #64748b;
        margin-top: 2px;
        line-height: 1.4;
      }
      .toast-close {
        cursor: pointer;
        color: #94a3b8;
        flex-shrink: 0;
      }
      .toast-close * {
        pointer-events: none;
      }
      @keyframes tIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      @keyframes tOut {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(400px);
          opacity: 0;
        }
      }
      .toast.removing {
        animation: tOut 0.3s ease forwards;
      }

      /* ── Page layout ── */
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1.75rem;
      }
      .page-title {
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--text);
      }
      .page-title span {
        color: var(--gold);
      }

      /* ── Stats bar ── */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        margin-bottom: 1.75rem;
      }
      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .stat-icon {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .stat-icon.pending {
        background: #fef3c7;
        color: #d97706;
      }
      .stat-icon.active {
        background: #d1fae5;
        color: #059669;
      }
      .stat-icon.blocked {
        background: #fee2e2;
        color: #dc2626;
      }
      .stat-icon.inactive {
        background: #f1f5f9;
        color: #64748b;
      }
      .stat-info .val {
        font-size: 1.4rem;
        font-weight: 900;
        color: var(--text);
        line-height: 1;
      }
      .stat-info .lbl {
        font-size: 0.72rem;
        color: var(--muted);
        margin-top: 2px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* ── Filter bar ── */
      .filter-bar {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1rem 1.25rem;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }
      .filter-tabs {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .ftab {
        padding: 6px 14px;
        border-radius: 20px;
        border: 2px solid var(--border);
        background: transparent;
        font-size: 0.8rem;
        font-weight: 700;
        cursor: pointer;
        color: var(--muted);
        transition: all 0.2s;
        white-space: nowrap;
      }
      .ftab:hover {
        border-color: #94a3b8;
        color: var(--text);
      }
      .ftab.active {
        background: var(--navy);
        border-color: var(--navy);
        color: #fff;
      }
      .ftab.active.pending {
        background: #d97706;
        border-color: #d97706;
      }
      .ftab.active.active-t {
        background: #059669;
        border-color: #059669;
      }
      .ftab.active.blocked {
        background: #dc2626;
        border-color: #dc2626;
      }
      .ftab.active.inactive {
        background: #64748b;
        border-color: #64748b;
      }

      .filter-right {
        margin-left: auto;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .search-wrap {
        position: relative;
      }
      .search-wrap input {
        padding: 8px 12px 8px 36px;
        border: 2px solid var(--border);
        border-radius: 8px;
        font-size: 0.85rem;
        width: 220px;
        outline: none;
        background: #fff;
        color: var(--text);
        transition: border-color 0.2s;
      }
      .search-wrap input:focus {
        border-color: #94a3b8;
      }
      .search-wrap svg {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
        pointer-events: none;
      }
      .filter-select {
        padding: 8px 12px;
        border: 2px solid var(--border);
        border-radius: 8px;
        font-size: 0.85rem;
        outline: none;
        background: #fff;
        color: var(--text);
        cursor: pointer;
      }

      /* ── Table ── */
      .table-wrap {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .table-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        gap: 12px;
        flex-wrap: wrap;
      }
      .table-head-title {
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--text);
      }
      .table-head-count {
        font-size: 0.8rem;
        color: var(--muted);
        background: #f1f5f9;
        padding: 3px 10px;
        border-radius: 20px;
      }

      .table-scroll {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 780px;
      }
      thead th {
        padding: 11px 16px;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-align: left;
        background: #f8fafc;
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.15s;
      }
      tbody tr:last-child {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #f8fafc;
      }
      tbody td {
        padding: 13px 16px;
        font-size: 0.875rem;
        color: var(--text);
        vertical-align: middle;
      }

      /* ── User cell ── */
      .user-cell {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #0ea5e9, #0369a1);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 13px;
        flex-shrink: 0;
      }
      .user-name {
        font-weight: 700;
        font-size: 0.875rem;
        color: var(--text);
      }
      .user-email {
        font-size: 0.75rem;
        color: var(--muted);
      }

      /* ── Card info ── */
      .card-badges {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 5px;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: capitalize;
      }
      .badge.visa {
        background: #eff6ff;
        color: #1d4ed8;
      }
      .badge.mastercard {
        background: #fff7ed;
        color: #c2410c;
      }
      .badge.amex {
        background: #f0fdf4;
        color: #15803d;
      }
      .badge.virtual {
        background: #f5f3ff;
        color: #7c3aed;
      }
      .badge.physical {
        background: #fdf4ff;
        color: #a21caf;
      }
      .badge.platinum {
        background: #1e293b;
        color: #e2e8f0;
      }
      .badge.gold {
        background: #fef3c7;
        color: #92400e;
      }
      .badge.silver {
        background: #f1f5f9;
        color: #475569;
      }

      /* ── Status badge ── */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
      }
      .status-badge::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .status-badge.pending {
        background: #fef3c7;
        color: #92400e;
      }
      .status-badge.pending::before {
        background: #d97706;
      }
      .status-badge.active {
        background: #d1fae5;
        color: #065f46;
      }
      .status-badge.active::before {
        background: #10b981;
      }
      .status-badge.blocked {
        background: #fee2e2;
        color: #991b1b;
      }
      .status-badge.blocked::before {
        background: #ef4444;
      }
      .status-badge.inactive {
        background: #f1f5f9;
        color: #475569;
      }
      .status-badge.inactive::before {
        background: #94a3b8;
      }

      /* ── Actions ── */
      .actions {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
      }
      .btn-action {
        padding: 5px 12px;
        border-radius: 6px;
        border: none;
        font-size: 0.75rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .btn-approve {
        background: #d1fae5;
        color: #065f46;
      }
      .btn-approve:hover {
        background: #a7f3d0;
      }
      .btn-block {
        background: #fee2e2;
        color: #991b1b;
      }
      .btn-block:hover {
        background: #fecaca;
      }
      .btn-deactivate {
        background: #f1f5f9;
        color: #475569;
      }
      .btn-deactivate:hover {
        background: #e2e8f0;
      }
      .btn-view {
        background: #eff6ff;
        color: #1d4ed8;
      }
      .btn-view:hover {
        background: #dbeafe;
      }

      /* ── Empty / Loading ── */
      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--muted);
      }
      .empty-state svg {
        opacity: 0.3;
        margin-bottom: 1rem;
      }
      .empty-state h3 {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 0.3rem;
      }
      .empty-state p {
        font-size: 0.85rem;
      }

      .skeleton {
        background: linear-gradient(
          90deg,
          #f1f5f9 25%,
          #e2e8f0 50%,
          #f1f5f9 75%
        );
        background-size: 200% 100%;
        animation: skeletonAnim 1.2s ease infinite;
        border-radius: 6px;
      }
      @keyframes skeletonAnim {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      /* ── Pagination ── */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-top: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 10px;
      }
      .pagination-info {
        font-size: 0.8rem;
        color: var(--muted);
      }
      .pagination-btns {
        display: flex;
        gap: 6px;
      }
      .pg-btn {
        width: 32px;
        height: 32px;
        border-radius: 7px;
        border: 2px solid var(--border);
        background: #fff;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 700;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
      }
      .pg-btn:hover:not(:disabled) {
        border-color: #94a3b8;
        background: #f8fafc;
      }
      .pg-btn.active {
        background: var(--navy);
        border-color: var(--navy);
        color: #fff;
      }
      .pg-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ── Modal ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(3px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .modal {
        background: #fff;
        border-radius: 16px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        transform: scale(0.95);
        transition: transform 0.2s;
        overflow: hidden;
      }
      .modal-overlay.open .modal {
        transform: scale(1);
      }
      .modal-header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .modal-header h2 {
        font-size: 1.1rem;
        font-weight: 900;
        color: var(--text);
      }
      .modal-close {
        background: none;
        border: none;
        cursor: pointer;
        color: #94a3b8;
        padding: 4px;
        border-radius: 6px;
      }
      .modal-close:hover {
        color: var(--text);
        background: #f1f5f9;
      }
      .modal-body {
        padding: 1.5rem;
      }
      .modal-field {
        margin-bottom: 1rem;
      }
      .modal-field label {
        display: block;
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 5px;
      }
      .modal-field input,
      .modal-field select {
        width: 100%;
        padding: 9px 12px;
        border: 2px solid var(--border);
        border-radius: 8px;
        font-size: 0.9rem;
        color: var(--text);
        outline: none;
        background: #fff;
        transition: border-color 0.2s;
      }
      .modal-field input:focus,
      .modal-field select:focus {
        border-color: #0ea5e9;
      }
      .modal-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .modal-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }
      .btn-cancel {
        padding: 8px 18px;
        border-radius: 8px;
        border: 2px solid var(--border);
        background: #fff;
        font-size: 0.875rem;
        font-weight: 700;
        cursor: pointer;
        color: var(--text);
      }
      .btn-cancel:hover {
        background: #f8fafc;
      }
      .btn-save {
        padding: 8px 20px;
        border-radius: 8px;
        border: none;
        background: linear-gradient(135deg, #0ea5e9, #0369a1);
        color: #fff;
        font-size: 0.875rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .btn-save:hover {
        opacity: 0.9;
      }
      .btn-save.loading {
        opacity: 0.7;
        cursor: not-allowed;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spin {
        animation: spin 0.7s linear infinite;
      }
    </style>
  </head>

  <body>
    <header id="topnav-mount"></header>

    <div class="admin-shell">
      <aside id="sidebar-mount" class="admin-sidebar"></aside>

      <main class="admin-main">
        <div class="admin-container" style="margin-top: 50px">
          <!-- Toast -->
          <div class="toast-wrap" id="toastWrap"></div>

          <!-- Header -->
          <div class="page-header">
            <h1 class="page-title">Card <span>Requests</span></h1>
            <button
              onclick="loadCards()"
              style="
                padding: 8px 16px;
                border-radius: 8px;
                border: 2px solid var(--border);
                background: #fff;
                font-size: 0.85rem;
                font-weight: 700;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 6px;
              "
              id="refreshBtn"
            >
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 2v6h-6" />
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
                <path d="M3 22v-6h6" />
                <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
              </svg>
              Refresh
            </button>
          </div>

          <!-- Stats -->
          <div class="stats-row" id="statsRow">
            <div class="stat-card">
              <div class="stat-icon pending">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12 6 12 12 16 14" />
                </svg>
              </div>
              <div class="stat-info">
                <div class="val" id="statPending">—</div>
                <div class="lbl">Pending</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon active">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                  <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
              </div>
              <div class="stat-info">
                <div class="val" id="statActive">—</div>
                <div class="lbl">Active</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon blocked">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="12" cy="12" r="10" />
                  <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
                </svg>
              </div>
              <div class="stat-info">
                <div class="val" id="statBlocked">—</div>
                <div class="lbl">Blocked</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon inactive">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="2" y="5" width="20" height="14" rx="2" />
                  <line x1="2" y1="10" x2="22" y2="10" />
                </svg>
              </div>
              <div class="stat-info">
                <div class="val" id="statInactive">—</div>
                <div class="lbl">Inactive</div>
              </div>
            </div>
          </div>

          <!-- Filter bar -->
          <div class="filter-bar">
            <div class="filter-tabs">
              <button
                class="ftab active pending"
                data-status="pending"
                onclick="setFilter('pending', this)"
              >
                ⏳ Pending
              </button>
              <button
                class="ftab active-t"
                data-status="active"
                onclick="setFilter('active', this)"
              >
                ✅ Active
              </button>
              <button
                class="ftab blocked"
                data-status="blocked"
                onclick="setFilter('blocked', this)"
              >
                🚫 Blocked
              </button>
              <button
                class="ftab inactive"
                data-status="inactive"
                onclick="setFilter('inactive', this)"
              >
                💤 Inactive
              </button>
              <button
                class="ftab"
                data-status="all"
                onclick="setFilter('all', this)"
              >
                All
              </button>
            </div>
            <div class="filter-right">
              <div class="search-wrap">
                <svg
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="11" cy="11" r="8" />
                  <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input
                  type="text"
                  id="searchInput"
                  placeholder="Search name or email..."
                  oninput="applySearch()"
                />
              </div>
              <select
                class="filter-select"
                id="brandFilter"
                onchange="applySearch()"
              >
                <option value="">All Brands</option>
                <option value="visa">Visa</option>
                <option value="mastercard">Mastercard</option>
                <option value="amex">Amex</option>
              </select>
              <select
                class="filter-select"
                id="tierFilter"
                onchange="applySearch()"
              >
                <option value="">All Tiers</option>
                <option value="platinum">Platinum</option>
                <option value="gold">Gold</option>
                <option value="silver">Silver</option>
              </select>
            </div>
          </div>

          <!-- Table -->
          <div class="table-wrap">
            <div class="table-head">
              <span class="table-head-title">Card Requests</span>
              <span class="table-head-count" id="tableCount">0 results</span>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th>User</th>
                    <th>Card Info</th>
                    <th>Card Number</th>
                    <th>Expiry</th>
                    <th>Status</th>
                    <th>Requested</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="tableBody">
                  <tr>
                    <td colspan="7">
                      <div class="empty-state"><p>Loading...</p></div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="pagination" id="paginationWrap" style="display: none">
              <span class="pagination-info" id="paginationInfo"></span>
              <div class="pagination-btns" id="paginationBtns"></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <footer id="footer-mount"></footer>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
      <div class="modal">
        <div class="modal-header">
          <h2>Update Card Request</h2>
          <button class="modal-close" onclick="closeModal()">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editCardId" />
          <div class="modal-row">
            <div class="modal-field">
              <label>Card Holder Name</label>
              <input
                type="text"
                id="editHolderName"
                placeholder="Full name on card"
              />
            </div>
            <div class="modal-field">
              <label>Status</label>
              <select id="editStatus">
                <option value="pending">Pending</option>
                <option value="active">Active</option>
                <option value="blocked">Blocked</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </div>
          <div class="modal-row">
            <div class="modal-field">
              <label>Card Number</label>
              <input
                type="text"
                id="editCardNumber"
                placeholder="16-digit number"
                maxlength="19"
              />
            </div>
            <div class="modal-field">
              <label>CVV</label>
              <input
                type="text"
                id="editCvv"
                placeholder="3-4 digits"
                maxlength="4"
              />
            </div>
          </div>
          <div class="modal-row">
            <div class="modal-field">
              <label>Expiry Month</label>
              <input
                type="text"
                id="editExpiryMonth"
                placeholder="MM"
                maxlength="2"
              />
            </div>
            <div class="modal-field">
              <label>Expiry Year</label>
              <input
                type="text"
                id="editExpiryYear"
                placeholder="YYYY"
                maxlength="4"
              />
            </div>
          </div>
          <div class="modal-row">
            <div class="modal-field">
              <label>Daily Limit (USD)</label>
              <input type="number" id="editDailyLimit" placeholder="1000" />
            </div>
            <div class="modal-field">
              <label>Balance (USD)</label>
              <input type="number" id="editBalance" placeholder="0" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="btn-save" id="saveBtn" onclick="saveCard()">
            <svg
              id="saveIcon"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
              />
              <polyline points="17 21 17 13 7 13 7 21" />
              <polyline points="7 3 7 8 15 8" />
            </svg>
            Save Changes
          </button>
        </div>
      </div>
    </div>

    <script src="/admin-script/admin-auth-required.js"></script>
    <script src="/admin-script/admin-logout.js"></script>
    <script src="/admin-script/admin-layout.js"></script>

    <script>
      const API = "/api/admin";
      const PER_PAGE = 15;

      let allCards = [];
      let filtered = [];
      let currentPage = 1;
      let currentStatus = "pending";

      // ── Toast ──────────────────────────────────────────────────
      function toast(msg, type = "info") {
        const id = "t" + Date.now();
        const icons = {
          success: `<svg width="13" height="13" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>`,
          error: `<svg width="13" height="13" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>`,
          info: `<svg width="13" height="13" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>`,
        };
        const titles = { success: "Success", error: "Error", info: "Info" };
        const d = document.createElement("div");
        d.className = `toast ${type}`;
        d.id = id;
        d.innerHTML = `<div class="toast-icon">${icons[type]}</div><div class="toast-body"><div class="toast-title">${titles[type]}</div><div class="toast-msg">${msg}</div></div><div class="toast-close" onclick="rmToast('${id}')"><svg width="15" height="15" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg></div>`;
        document.getElementById("toastWrap").appendChild(d);
        setTimeout(() => rmToast(id), 5000);
      }
      function rmToast(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.add("removing");
        setTimeout(() => el.remove(), 300);
      }

      // ── Load all cards ─────────────────────────────────────────
      async function loadCards() {
        const btn = document.getElementById("refreshBtn");
        btn.querySelector("svg").classList.add("spin");
        showSkeleton();

        try {
          const res = await fetch(`${API}/cards`, { credentials: "include" });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          allCards = data.cards || [];
          updateStats();
          applyFilter();
          toast(`Loaded ${allCards.length} card records.`, "info");
        } catch (err) {
          document.getElementById("tableBody").innerHTML =
            `<tr><td colspan="7"><div class="empty-state"><h3>Failed to load</h3><p>${err.message}</p></div></td></tr>`;
          toast(err.message || "Failed to load cards.", "error");
        } finally {
          btn.querySelector("svg").classList.remove("spin");
        }
      }

      // ── Stats ──────────────────────────────────────────────────
      function updateStats() {
        ["pending", "active", "blocked", "inactive"].forEach((s) => {
          const el = document.getElementById(
            "stat" + s.charAt(0).toUpperCase() + s.slice(1),
          );
          if (el)
            el.textContent = allCards.filter((c) => c.status === s).length;
        });
      }

      // ── Filter ─────────────────────────────────────────────────
      function setFilter(status, btn) {
        currentStatus = status;
        currentPage = 1;
        document
          .querySelectorAll(".ftab")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        applySearch();
      }

      function applyFilter() {
        applySearch();
      }

      function applySearch() {
        const q = document
          .getElementById("searchInput")
          .value.trim()
          .toLowerCase();
        const brand = document.getElementById("brandFilter").value;
        const tier = document.getElementById("tierFilter").value;

        filtered = allCards.filter((c) => {
          if (currentStatus !== "all" && c.status !== currentStatus)
            return false;
          if (brand && c.card_brand !== brand) return false;
          if (tier && c.card_tier !== tier) return false;
          if (q) {
            const name = (c.user?.name || "").toLowerCase();
            const email = (c.user?.email || "").toLowerCase();
            const holder = (c.card_holder_name || "").toLowerCase();
            if (!name.includes(q) && !email.includes(q) && !holder.includes(q))
              return false;
          }
          return true;
        });

        currentPage = 1;
        renderTable();
      }

      // ── Skeleton rows ──────────────────────────────────────────
      function showSkeleton() {
        const rows = Array.from({ length: 8 })
          .map(
            () => `
          <tr>
            ${Array.from({ length: 7 })
              .map(
                () =>
                  `<td><div class="skeleton" style="height:20px;border-radius:5px;"></div></td>`,
              )
              .join("")}
          </tr>`,
          )
          .join("");
        document.getElementById("tableBody").innerHTML = rows;
      }

      // ── Render table ───────────────────────────────────────────
      function renderTable() {
        const total = filtered.length;
        const pages = Math.ceil(total / PER_PAGE) || 1;
        if (currentPage > pages) currentPage = pages;

        const start = (currentPage - 1) * PER_PAGE;
        const slice = filtered.slice(start, start + PER_PAGE);

        document.getElementById("tableCount").textContent =
          `${total} result${total !== 1 ? "s" : ""}`;

        if (!slice.length) {
          document.getElementById("tableBody").innerHTML = `
            <tr><td colspan="7">
              <div class="empty-state">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                <h3>No cards found</h3>
                <p>Try changing the filter or search term.</p>
              </div>
            </td></tr>`;
          document.getElementById("paginationWrap").style.display = "none";
          return;
        }

        document.getElementById("tableBody").innerHTML = slice
          .map((c) => {
            const user = c.user || {};
            const initials = (user.name || "U")
              .split(" ")
              .map((n) => n[0])
              .join("")
              .slice(0, 2)
              .toUpperCase();
            const reqDate = new Date(c.createdAt).toLocaleDateString("en-GB", {
              day: "2-digit",
              month: "short",
              year: "numeric",
            });
            const cardNum = c.card_number
              ? `•••• ${c.last_four || c.card_number.slice(-4)}`
              : '<span style="color:#94a3b8">Not set</span>';
            const expiry =
              c.expiry_month && c.expiry_year
                ? `${c.expiry_month}/${c.expiry_year.slice(-2)}`
                : '<span style="color:#94a3b8">—</span>';

            // Action buttons based on current status
            let actions = `<button class="btn-action btn-view" onclick="openModal('${c._id}')">Edit</button>`;
            if (c.status === "pending") {
              actions += `<button class="btn-action btn-approve" onclick="quickStatus('${c._id}','active')">Approve</button>`;
              actions += `<button class="btn-action btn-block"   onclick="quickStatus('${c._id}','blocked')">Block</button>`;
            } else if (c.status === "active") {
              actions += `<button class="btn-action btn-block"      onclick="quickStatus('${c._id}','blocked')">Block</button>`;
              actions += `<button class="btn-action btn-deactivate" onclick="quickStatus('${c._id}','inactive')">Deactivate</button>`;
            } else if (c.status === "blocked" || c.status === "inactive") {
              actions += `<button class="btn-action btn-approve" onclick="quickStatus('${c._id}','active')">Activate</button>`;
            }

            return `
            <tr>
              <td>
                <div class="user-cell">
                  <div class="user-avatar">${initials}</div>
                  <div>
                    <div class="user-name">${user.name || "Unknown"}</div>
                    <div class="user-email">${user.email || "—"}</div>
                  </div>
                </div>
              </td>
              <td>
                <div class="card-badges">
                  <span class="badge ${c.card_brand}">${c.card_brand || "—"}</span>
                  <span class="badge ${c.card_type}">${c.card_type || "—"}</span>
                  <span class="badge ${c.card_tier}">${c.card_tier || "—"}</span>
                </div>
              </td>
              <td style="font-family:monospace;font-weight:700;font-size:.85rem;">${cardNum}</td>
              <td style="font-weight:700">${expiry}</td>
              <td><span class="status-badge ${c.status}">${c.status}</span></td>
              <td style="color:var(--muted);font-size:.8rem;">${reqDate}</td>
              <td><div class="actions">${actions}</div></td>
            </tr>`;
          })
          .join("");

        // Pagination
        const wrap = document.getElementById("paginationWrap");
        wrap.style.display = "flex";
        document.getElementById("paginationInfo").textContent =
          `Showing ${start + 1}–${Math.min(start + PER_PAGE, total)} of ${total}`;

        const btns = document.getElementById("paginationBtns");
        btns.innerHTML = "";
        const addBtn = (label, pg, disabled = false) => {
          const b = document.createElement("button");
          b.className = "pg-btn" + (pg === currentPage ? " active" : "");
          b.innerHTML = label;
          b.disabled = disabled;
          b.onclick = () => {
            currentPage = pg;
            renderTable();
          };
          btns.appendChild(b);
        };
        addBtn("‹", currentPage - 1, currentPage === 1);
        for (
          let p = Math.max(1, currentPage - 2);
          p <= Math.min(pages, currentPage + 2);
          p++
        )
          addBtn(p, p);
        addBtn("›", currentPage + 1, currentPage === pages);
      }

      // ── Quick status update ────────────────────────────────────
      async function quickStatus(cardId, newStatus) {
        try {
          const res = await fetch(`${API}/cards/${cardId}/status`, {
            method: "PATCH",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: newStatus }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);

          // Update local data
          const card = allCards.find((c) => c._id === cardId);
          if (card) card.status = newStatus;
          updateStats();
          applySearch();
          toast(`Card status updated to "${newStatus}".`, "success");
        } catch (err) {
          toast(err.message || "Failed to update status.", "error");
        }
      }

      // ── Edit modal ─────────────────────────────────────────────
      function openModal(cardId) {
        const card = allCards.find((c) => c._id === cardId);
        if (!card) return;
        document.getElementById("editCardId").value = card._id;
        document.getElementById("editHolderName").value =
          card.card_holder_name || "";
        document.getElementById("editStatus").value = card.status;
        document.getElementById("editCardNumber").value =
          card.card_number || "";
        document.getElementById("editCvv").value = card.cvv || "";
        document.getElementById("editExpiryMonth").value =
          card.expiry_month || "";
        document.getElementById("editExpiryYear").value =
          card.expiry_year || "";
        document.getElementById("editDailyLimit").value =
          card.daily_limit || 1000;
        document.getElementById("editBalance").value = card.balance || 0;
        document.getElementById("editModal").classList.add("open");
      }

      function closeModal() {
        document.getElementById("editModal").classList.remove("open");
      }

      // Close on backdrop click
      document.getElementById("editModal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeModal();
      });

      async function saveCard() {
        const btn = document.getElementById("saveBtn");
        const icon = document.getElementById("saveIcon");
        if (btn.classList.contains("loading")) return;
        btn.classList.add("loading");
        icon.style.animation = "spin .7s linear infinite";

        const cardId = document.getElementById("editCardId").value;
        const payload = {
          card_holder_name: document
            .getElementById("editHolderName")
            .value.trim(),
          status: document.getElementById("editStatus").value,
          card_number: document.getElementById("editCardNumber").value.trim(),
          last_four: document
            .getElementById("editCardNumber")
            .value.trim()
            .slice(-4),
          cvv: document.getElementById("editCvv").value.trim(),
          expiry_month: document.getElementById("editExpiryMonth").value.trim(),
          expiry_year: document.getElementById("editExpiryYear").value.trim(),
          daily_limit: Number(document.getElementById("editDailyLimit").value),
          balance: Number(document.getElementById("editBalance").value),
        };

        try {
          const res = await fetch(`${API}/cards/${cardId}`, {
            method: "PATCH",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);

          // Update local data
          const idx = allCards.findIndex((c) => c._id === cardId);
          if (idx !== -1) allCards[idx] = { ...allCards[idx], ...payload };
          updateStats();
          applySearch();
          closeModal();
          toast("Card updated successfully.", "success");
        } catch (err) {
          toast(err.message || "Failed to save changes.", "error");
        } finally {
          btn.classList.remove("loading");
          icon.style.animation = "";
        }
      }

      // ── Init ───────────────────────────────────────────────────
      loadCards();
    </script>
  </body>
</html>
