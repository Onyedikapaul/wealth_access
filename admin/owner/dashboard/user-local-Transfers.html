<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Local Transfers</title>
    <link rel="stylesheet" href="/admin/owner/dashboard/css/layout.css" />
    <link rel="icon" href="/assets/images/logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      body { font-family: "DM Sans", sans-serif; }
      .page-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        margin-top: 25px;
        margin-bottom: 60px;
      }
      .page-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        width: 90%;
        max-width: 1100px;
        margin: 40px 0 1.5rem;
      }
      .page-head h1 { margin: 0; font-size: 1.55rem; font-weight: 700; color: #0f172a; letter-spacing: -0.02em; }
      .page-head p { margin: 5px 0 0; color: #64748b; font-size: 0.875rem; }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        width: 90%;
        max-width: 1100px;
        overflow: hidden;
        box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      }
      .card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.1rem 1.5rem;
        border-bottom: 1px solid #e2e8f0;
        background: #f8fafc;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .user-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        background: #eff6ff;
        color: #1d4ed8;
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 600;
      }
      .count-pill {
        background: #f1f5f9;
        color: #64748b;
        padding: 0.3rem 0.75rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 500;
      }
      .table-wrap { overflow-x: auto; }
      table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
      thead tr { background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
      th {
        padding: 0.75rem 1.1rem;
        text-align: left;
        font-size: 0.7rem;
        font-weight: 700;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        white-space: nowrap;
      }
      td {
        padding: 0.95rem 1.1rem;
        border-bottom: 1px solid #f1f5f9;
        color: #334155;
        vertical-align: middle;
      }
      tbody tr:last-child td { border-bottom: none; }
      tbody tr:hover td { background: #fafbfc; }
      .amount-cell { font-weight: 700; font-size: 0.95rem; }
      .amount-cell span { font-size: 0.72rem; font-weight: 400; color: #94a3b8; margin-left: 2px; }
      .amount-debit { color: #dc2626; }
      .amount-credit { color: #16a34a; }
      .type-badge {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 0.18rem 0.55rem;
        border-radius: 999px;
        font-size: 0.68rem;
        font-weight: 700;
        margin-top: 3px;
      }
      .type-debit { background: #fee2e2; color: #991b1b; }
      .type-credit { background: #d1fae5; color: #065f46; }
      .bank-info { line-height: 1.5; }
      .bank-name { font-weight: 600; color: #0f172a; font-size: 0.85rem; }
      .bank-sub { font-size: 0.75rem; color: #94a3b8; }
      .mono {
        font-family: "Courier New", monospace;
        font-size: 0.75rem;
        color: #64748b;
        background: #f1f5f9;
        padding: 0.18rem 0.45rem;
        border-radius: 4px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.28rem 0.7rem;
        border-radius: 999px;
        font-size: 0.73rem;
        font-weight: 600;
        white-space: nowrap;
      }
      .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
      .badge-pending { background: #fef3c7; color: #92400e; }
      .badge-pending::before { background: #f59e0b; }
      .badge-completed { background: #d1fae5; color: #065f46; }
      .badge-completed::before { background: #10b981; }
      .badge-failed { background: #fee2e2; color: #991b1b; }
      .badge-failed::before { background: #ef4444; }
      .action-cell { display: flex; flex-direction: column; gap: 0.4rem; min-width: 130px; }
      .btn {
        padding: 0.38rem 0.85rem;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 0.75rem;
        font-weight: 600;
        font-family: inherit;
        transition: all 0.18s;
        text-align: center;
        width: 100%;
      }
      .btn-complete { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
      .btn-complete:hover { background: #10b981; color: #fff; border-color: #10b981; }
      .btn-fail { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
      .btn-fail:hover { background: #ef4444; color: #fff; border-color: #ef4444; }
      .btn-pending { background: #fefce8; color: #92400e; border: 1px solid #fde68a; }
      .btn-pending:hover { background: #f59e0b; color: #fff; border-color: #f59e0b; }
      .btn-delete { background: #fdf2f8; color: #7e1d4e; border: 1px solid #f0abcb; }
      .btn-delete:hover { background: #be185d; color: #fff; border-color: #be185d; }
      .btn-ghost {
        background: transparent;
        border: 1px solid #e2e8f0;
        color: #64748b;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.5rem 1.1rem;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-ghost:hover { background: #f8fafc; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .empty { text-align: center; padding: 3.5rem; color: #94a3b8; font-size: 0.9rem; }
      .toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
      .toast {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.85rem 1.2rem;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 500;
        min-width: 280px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        animation: slideIn 0.25s ease;
      }
      .toast.success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
      .toast.error { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
      .toast.warning { background: #fef3c7; color: #92400e; border-left: 4px solid #f59e0b; }
      @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
        animation: fadeIn 0.2s ease;
      }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .dialog {
        background: #fff;
        border-radius: 12px;
        padding: 2rem;
        max-width: 420px;
        width: 90%;
        box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      }
      .dialog h3 { margin: 0 0 0.5rem; font-size: 1.05rem; color: #0f172a; }
      .dialog p { margin: 0 0 1.5rem; color: #64748b; font-size: 0.875rem; line-height: 1.5; }
      .dialog-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
      .btn-modal-cancel {
        padding: 0.55rem 1.1rem; border-radius: 7px; border: 1px solid #e2e8f0;
        background: #fff; color: #64748b; font-size: 0.875rem; font-family: inherit;
        font-weight: 500; cursor: pointer;
      }
      .btn-modal-cancel:hover { background: #f8fafc; }
      .btn-modal-complete {
        padding: 0.55rem 1.25rem; border-radius: 7px; border: none;
        background: #10b981; color: #fff; font-size: 0.875rem; font-family: inherit;
        font-weight: 600; cursor: pointer;
      }
      .btn-modal-complete:hover { background: #059669; }
      .btn-modal-fail {
        padding: 0.55rem 1.25rem; border-radius: 7px; border: none;
        background: #ef4444; color: #fff; font-size: 0.875rem; font-family: inherit;
        font-weight: 600; cursor: pointer;
      }
      .btn-modal-fail:hover { background: #b91c1c; }
      .btn-modal-pending {
        padding: 0.55rem 1.25rem; border-radius: 7px; border: none;
        background: #f59e0b; color: #fff; font-size: 0.875rem; font-family: inherit;
        font-weight: 600; cursor: pointer;
      }
      .btn-modal-pending:hover { background: #d97706; }
      .btn-modal-delete {
        padding: 0.55rem 1.25rem; border-radius: 7px; border: none;
        background: #be185d; color: #fff; font-size: 0.875rem; font-family: inherit;
        font-weight: 600; cursor: pointer;
      }
      .btn-modal-delete:hover { background: #9d174d; }
    </style>
  </head>

  <body>
    <div class="toast-container" id="toast-container"></div>
    <header id="topnav-mount"></header>

    <div class="page-wrap">
      <div class="page-head">
        <div>
          <h1>Local Transfers</h1>
          <p>View and manage local transfer records for this user.</p>
        </div>
        <button onclick="history.back()" class="btn-ghost">← Back</button>
      </div>

      <div class="card">
        <div class="card-head">
          <span class="user-pill" id="userPill">Loading...</span>
          <span class="count-pill" id="countText"></span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Recipient</th>
                <th>Reference</th>
                <th>Bal. Before</th>
                <th>Bal. After</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="transfersTbody">
              <tr>
                <td colspan="8" class="empty">Loading transfers...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const userId = new URLSearchParams(window.location.search).get("userId");

      function showToast(type, message) {
        const container = document.getElementById("toast-container");
        const t = document.createElement("div");
        t.className = `toast ${type}`;
        const icons = { success: "✅", error: "❌", warning: "⚠️" };
        t.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
        container.appendChild(t);
        setTimeout(() => t.remove(), 3500);
      }

      function esc(str) {
        return String(str ?? "").replace(
          /[&<>"']/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[m]
        );
      }

      function badge(s) {
        return `<span class="badge badge-${s}">${s.charAt(0).toUpperCase() + s.slice(1)}</span>`;
      }

      function fmt(n) {
        return "$" + Number(n ?? 0).toLocaleString("en-US", { minimumFractionDigits: 2 });
      }

      function formatDate(d) {
        if (!d) return "—";
        const date = new Date(d);
        return (
          date.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) +
          " · " +
          date.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" })
        );
      }

      function amountCell(t) {
        const isCredit = t.type === "credit";
        const arrow = isCredit ? "↑" : "↓";
        const colorClass = isCredit ? "amount-credit" : "amount-debit";
        const typeBadge = isCredit
          ? `<span class="type-badge type-credit">↑ Credit</span>`
          : `<span class="type-badge type-debit">↓ Debit</span>`;
        return `
          <div class="amount-cell ${colorClass}">
            ${arrow} ${fmt(t.amount)}<span>USD</span>
          </div>
          ${typeBadge}
        `;
      }

      function actionButtons(t) {
        const id = t._id;
        const s = t.status;

        const complete = `<button class="btn btn-complete" onclick="openCompleteModal('${id}')">✓ Complete</button>`;
        const fail     = `<button class="btn btn-fail"    onclick="openFailModal('${id}')">✕ Mark Failed</button>`;
        const pending  = `<button class="btn btn-pending" onclick="openPendingModal('${id}')">↩ Set Pending</button>`;
        const del      = `<button class="btn btn-delete"  onclick="openDeleteModal('${id}')">🗑 Delete</button>`;

        if (s === "pending")   return `<div class="action-cell">${complete}${fail}${del}</div>`;
        if (s === "completed") return `<div class="action-cell">${fail}${pending}${del}</div>`;
        if (s === "failed")    return `<div class="action-cell">${complete}${pending}${del}</div>`;

        return `<div class="action-cell">${del}</div>`;
      }

      async function loadUser() {
        if (!userId) return;
        try {
          const res = await fetch(`/api/admin/users/${userId}`, { credentials: "include" });
          const { success, user } = await res.json();
          if (!success) throw new Error();
          document.getElementById("userPill").textContent = `👤 ${user.name}  •  ${user.email}`;
        } catch {
          document.getElementById("userPill").textContent = "Unknown user";
        }
      }

      async function loadTransfers() {
        try {
          const res = await fetch(`/api/admin/users/${userId}/local-transfers`, { credentials: "include" });
          const { success, transfers } = await res.json();
          if (!success) throw new Error();

          document.getElementById("countText").textContent =
            `${transfers.length} transfer${transfers.length !== 1 ? "s" : ""}`;

          const tbody = document.getElementById("transfersTbody");
          if (!transfers.length) {
            tbody.innerHTML = `<tr><td colspan="8" class="empty">No local transfers found for this user.</td></tr>`;
            return;
          }

          tbody.innerHTML = transfers.map((t) => `
            <tr>
              <td style="white-space:nowrap;color:#64748b;font-size:0.8rem;">${formatDate(t.createdAt)}</td>
              <td>${amountCell(t)}</td>
              <td>
                <div class="bank-info">
                  <div class="bank-name">${esc(t.accountname)}</div>
                  <div class="bank-sub">${esc(t.bankname)}  ·  ${esc(t.accountnumber)}</div>
                  <div class="bank-sub">${esc(t.accounttype || "")}</div>
                </div>
              </td>
              <td><span class="mono">${esc(t.reference || "—")}</span></td>
              <td style="color:#64748b;font-size:0.85rem;">${fmt(t.balanceBefore)}</td>
              <td style="color:#64748b;font-size:0.85rem;">${fmt(t.balanceAfter)}</td>
              <td>${badge(t.status)}</td>
              <td>${actionButtons(t)}</td>
            </tr>
          `).join("");
        } catch {
          document.getElementById("transfersTbody").innerHTML =
            `<tr><td colspan="8" class="empty">Failed to load transfers.</td></tr>`;
        }
      }

      // ── Complete Modal ──
      let completeTarget = null;
      function openCompleteModal(id) {
        completeTarget = id;
        const overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.id = "completeOverlay";
        overlay.innerHTML = `
          <div class="dialog">
            <h3>Mark as Completed</h3>
            <p>This will apply the transfer amount to the user's balance (deduct for debit, add for credit). Are you sure?</p>
            <div class="dialog-actions">
              <button onclick="closeCompleteModal()" class="btn-modal-cancel">Cancel</button>
              <button onclick="submitStatus('completed', 'completeOverlay')" class="btn-modal-complete">Yes, Complete</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
      }
      function closeCompleteModal() { document.getElementById("completeOverlay")?.remove(); }

      // ── Fail Modal ──
      let failTarget = null;
      function openFailModal(id) {
        failTarget = id;
        const overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.id = "failOverlay";
        overlay.innerHTML = `
          <div class="dialog">
            <h3>Mark as Failed</h3>
            <p>If the transfer was previously completed, the balance change will be reversed. Are you sure?</p>
            <div class="dialog-actions">
              <button onclick="closeFailModal()" class="btn-modal-cancel">Cancel</button>
              <button onclick="submitStatus('failed', 'failOverlay')" class="btn-modal-fail">Yes, Mark Failed</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
      }
      function closeFailModal() { document.getElementById("failOverlay")?.remove(); }

      // ── Set Pending Modal ──
      let pendingTarget = null;
      function openPendingModal(id) {
        pendingTarget = id;
        const overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.id = "pendingOverlay";
        overlay.innerHTML = `
          <div class="dialog">
            <h3>Set Back to Pending</h3>
            <p>If the transfer was completed, the balance change will be reversed. Are you sure?</p>
            <div class="dialog-actions">
              <button onclick="closePendingModal()" class="btn-modal-cancel">Cancel</button>
              <button onclick="submitStatus('pending', 'pendingOverlay')" class="btn-modal-pending">Yes, Set Pending</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
      }
      function closePendingModal() { document.getElementById("pendingOverlay")?.remove(); }

      // ── Delete Modal ──
      let deleteTarget = null;
      function openDeleteModal(id) {
        deleteTarget = id;
        const overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.id = "deleteOverlay";
        overlay.innerHTML = `
          <div class="dialog">
            <h3>Delete Transfer</h3>
            <p>⚠️ This will permanently delete this transfer record. This action cannot be undone. Are you absolutely sure?</p>
            <div class="dialog-actions">
              <button onclick="closeDeleteModal()" class="btn-modal-cancel">Cancel</button>
              <button onclick="submitDelete()" class="btn-modal-delete">Yes, Delete</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
      }
      function closeDeleteModal() { document.getElementById("deleteOverlay")?.remove(); }

      async function submitDelete() {
        try {
          const res = await fetch(`/api/admin/local-transfers/${deleteTarget}`, {
            method: "DELETE",
            credentials: "include",
          });
          const { success, message } = await res.json();
          if (!success) throw new Error(message);
          showToast("success", "Transfer deleted successfully");
          document.getElementById("deleteOverlay")?.remove();
          loadTransfers();
        } catch (err) {
          showToast("error", err.message || "Failed to delete transfer");
        }
      }

      // ── Shared status submit ──
      async function submitStatus(newStatus, overlayId) {
        const id =
          newStatus === "completed" ? completeTarget :
          newStatus === "failed"    ? failTarget     :
          pendingTarget;
        try {
          const res = await fetch(`/api/admin/local-transfers/${id}/status`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ status: newStatus }),
          });
          const { success, message } = await res.json();
          if (!success) throw new Error(message);
          showToast("success", `Transfer marked as ${newStatus}`);
          document.getElementById(overlayId)?.remove();
          loadTransfers();
        } catch (err) {
          showToast("error", err.message || "Failed to update transfer");
        }
      }

      loadUser();
      loadTransfers();
    </script>

    <script src="/admin-script/admin-auth-required.js"></script>
    <script src="/admin-script/admin-logout.js"></script>
    <script src="/admin-script/admin-layout.js"></script>
  </body>
</html>
