<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link rel="icon" href="/assets/images/logo.png" />

    <link rel="stylesheet" href="/admin/owner/dashboard/css/layout.css" />

    <style>
      :root {
        --primary: #033d75;
        --bg: #f6f8fb;
        --card: #ffffff;
        --border: rgba(0, 0, 0, 0.1);
        --muted: rgba(0, 0, 0, 0.6);
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
      }

      .wrap {
        width: 100%;
        max-width: 440px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .logo {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: rgba(3, 61, 117, 0.1);
        border: 1px solid rgba(3, 61, 117, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        color: var(--primary);
      }

      .brand h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.02em;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 16px 35px rgba(0, 0, 0, 0.08);
      }

      .title {
        margin: 0 0 6px 0;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .input {
        width: 100%;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        outline: none;
        background: #fff;
        font-size: 15px;
        transition:
          box-shadow 120ms ease,
          border-color 120ms ease;
      }

      .input:focus {
        border-color: rgba(3, 61, 117, 0.4);
        box-shadow: 0 0 0 4px rgba(3, 61, 117, 0.12);
      }

      .field {
        margin-bottom: 12px;
      }

      .btn {
        width: 100%;
        padding: 12px 14px;
        border: 0;
        border-radius: 12px;
        cursor: pointer;
        background: var(--primary);
        color: #fff;
        font-weight: 700;
        font-size: 15px;
        transition:
          transform 120ms ease,
          box-shadow 120ms ease,
          opacity 120ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 26px rgba(3, 61, 117, 0.22);
      }

      .btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .hint {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }

      .alert {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 13px;
        line-height: 1.4;
      }

      .alert-success {
        background: #e7f7ee;
        border: 1px solid #c6efd5;
        color: #1f7a3f;
      }

      .alert-danger {
        background: #fdecec;
        border: 1px solid #f7caca;
        color: #a42b2b;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 8px;
      }

      .small-link {
        font-size: 12px;
        color: rgba(3, 61, 117, 0.9);
        text-decoration: none;
      }

      .small-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="brand">
        <div class="logo">WA</div>
        <h1>Wealth Access</h1>
      </div>

      <div class="card">
        <h2 class="title">Sign in</h2>
        <p class="subtitle">
          Login with your admin credentials to access the dashboard.
        </p>

        <form id="loginForm">
          <div class="field">
            <label for="email">Email</label>
            <input
              id="email"
              class="input"
              type="email"
              placeholder="Email"
              autocomplete="username"
              required
            />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input
              id="password"
              class="input"
              type="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>

          <button class="btn" id="loginBtn" type="submit">Login</button>

          <div class="row">
            <span class="hint" style="margin: 0">Secure admin access</span>
            <a class="small-link" href="/" title="Back to site">Back to site</a>
          </div>

          <div id="result"></div>
        </form>
      </div>
    </div>

    <script src="/admin-script/admin-auth-guard.js"></script>

    <script>
      (function () {
        const form = document.getElementById("loginForm");
        const btn = document.getElementById("loginBtn");
        const result = document.getElementById("result");

        function esc(str) {
          return String(str ?? "").replace(
            /[&<>"']/g,
            (m) =>
              ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;",
              })[m],
          );
        }

        function show(type, msg) {
          const cls =
            type === "success" ? "alert alert-success" : "alert alert-danger";
          result.innerHTML = `<div class="${cls}">${esc(msg)}</div>`;
        }

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          result.innerHTML = "";

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          if (!email || !password)
            return show("error", "Email and password are required.");

          try {
            btn.disabled = true;
            btn.textContent = "Signing in...";

            const res = await fetch("/api/admin/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ email, password }),
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok) {
              throw new Error(data.message || "Login failed");
            }

            show("success", data.message || "Login successful. Redirecting...");

            // ✅ Redirect to admin dashboard
            setTimeout(() => {
              window.location.href = "/admin/owner/dashboard";
            }, 600);
          } catch (err) {
            console.error(err);
            show("error", err.message || "Login failed");
          } finally {
            btn.disabled = false;
            btn.textContent = "Login";
          }
        });
      })();
    </script>
  </body>
</html>
