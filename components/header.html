<header
  x-show="isDesktop"
  x-cloak
  class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-xl border-b border-gray-200/50 dark:border-gray-700/50 px-6 py-4 shadow-sm relative z-50"
>
  <div class="flex items-center justify-between">
    <!-- Page Title & Breadcrumb -->
    <div class="flex items-center space-x-4">
      <div>
        <h1
          data-page-title
          class="text-2xl font-bold text-gray-900 dark:text-white"
        ></h1>

        <p
          data-welcome-message
          class="welcome-user-message text-sm text-gray-500 dark:text-gray-400 mt-1"
        ></p>
      </div>
    </div>

    <!-- Header Actions -->
    <div class="flex items-center space-x-4">
      <!-- Dark Mode Toggle -->
      <button
        @click="toggleDarkMode()"
        class="w-11 h-11 bg-gray-50 hover:bg-primary-50 dark:bg-gray-800 dark:hover:bg-gray-700 rounded-2xl flex items-center justify-center transition-colors group"
      >
        <i
          x-show="!darkMode"
          class="fa-solid fa-moon text-gray-600 group-hover:text-primary-600 dark:text-gray-300 transition-colors"
        ></i>
        <i
          x-show="darkMode"
          class="fa-solid fa-sun text-yellow-500 group-hover:text-yellow-400 transition-colors"
        ></i>
      </button>

      <!-- Notifications -->
      <div class="relative">
        <!-- <button
          @click="toggleNotifications()"
          class="relative w-11 h-11 bg-gray-50 hover:bg-primary-50 dark:bg-gray-800 dark:hover:bg-gray-700 rounded-2xl flex items-center justify-center transition-colors group"
        >
          <i
            class="fa-solid fa-bell text-gray-600 group-hover:text-primary-600 dark:text-gray-300 dark:group-hover:text-primary-400 transition-colors"
          ></i>
        </button> -->

        <!-- Notifications Dropdown -->
        <div
          x-show="notificationOpen"
          x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="opacity-0 scale-95"
          x-transition:enter-end="opacity-1 scale-100"
          x-transition:leave="transition ease-in duration-150"
          x-transition:leave-start="opacity-1 scale-100"
          x-transition:leave-end="opacity-0 scale-95"
          class="absolute right-0 mt-2 w-80 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-200/50 dark:border-gray-700/50 z-[99999]"
        >
          <div class="p-4 border-b border-gray-100 dark:border-gray-700">
            <div class="flex items-center justify-between">
              <h3 class="text-lg font-bold text-gray-900 dark:text-white">
                Notifications
              </h3>
            </div>
          </div>

          <!-- Notification Items -->
          <div
            data-notification-list
            class="max-h-96 overflow-y-auto custom-scrollbar"
          >
            <!-- JS will populate this -->
            <div
              class="p-6 text-center text-sm text-gray-500 dark:text-gray-400"
            >
              Loading...
            </div>
          </div>

          <div class="p-4 border-t border-gray-100 dark:border-gray-700">
            <div class="flex items-center justify-between">
              <button
                data-mark-all-read
                type="button"
                class="text-sm font-semibold text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300 transition-colors"
              >
                Mark all as read
              </button>
              <a
                href="/dashboard/notifications.html"
                class="text-sm font-semibold text-primary-600 hover:text-primary-700 transition-colors"
              >
                View All Notifications
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- User Dropdown -->
      <div class="relative">
        <button
          @click="toggleUserDropdown()"
          class="flex items-center space-x-3 p-2 rounded-2xl hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors group"
        >
          <div class="relative user-avatar">
            <img
              class="user-avatar-img h-10 w-10 rounded-full object-cover border-2 border-primary-100 hidden"
              alt="User Avatar"
            />
            <div
              class="user-avatar-fallback h-10 w-10 rounded-full flex items-center justify-center font-bold text-white bg-[#ef4444] border-2 border-primary-100 hidden"
            >
              <span class="user-avatar-initials"></span>
            </div>
            <div
              class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 rounded-full border-2 border-white dark:border-gray-600"
            ></div>
          </div>

          <div class="hidden md:block text-left">
            <p
              class="user-fullname text-sm font-semibold text-gray-900 dark:text-white"
            ></p>
            <p class="user-email text-xs text-gray-500 dark:text-gray-400"></p>
          </div>

          <i
            class="fa-solid fa-chevron-down text-gray-400 dark:text-gray-500 text-sm group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors"
          ></i>
        </button>

        <!-- User Dropdown Menu -->
        <div
          x-show="userDropdownOpen"
          x-transition:enter="transition ease-out duration-200"
          x-transition:enter-start="opacity-0 scale-95"
          x-transition:enter-end="opacity-1 scale-100"
          x-transition:leave="transition ease-in duration-150"
          x-transition:leave-start="opacity-1 scale-100"
          x-transition:leave-end="opacity-0 scale-95"
          class="absolute right-0 mt-2 w-64 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-200/50 dark:border-gray-700/50 z-[99998]"
        >
          <div class="p-4 border-b border-gray-100 dark:border-gray-700">
            <div class="flex items-center space-x-3">
              <div class="relative user-avatar">
                <img
                  class="user-avatar-img h-10 w-10 rounded-full object-cover border-2 border-primary-100 hidden"
                  alt="User Avatar"
                />
                <div
                  class="user-avatar-fallback h-10 w-10 rounded-full flex items-center justify-center font-bold text-white bg-[#ef4444] border-2 border-primary-100 hidden"
                >
                  <span class="user-avatar-initials"></span>
                </div>
                <div
                  class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 rounded-full border-2 border-white dark:border-gray-600"
                ></div>
              </div>

              <div>
                <p
                  class="user-fullname text-sm font-bold text-gray-900 dark:text-white"
                ></p>
                <p
                  class="user-email text-xs text-gray-500 dark:text-gray-400"
                ></p>
              </div>
            </div>

            <!-- KYC Verification Status (keep your existing markup) -->
            <!-- <div class="mt-3">
              <div
                class="flex items-center justify-center py-2 rounded-xl bg-green-50 dark:bg-green-900/30 border border-green-100 dark:border-green-800"
              >
                <span
                  class="text-xs text-green-800 dark:text-green-300 font-semibold flex items-center"
                >
                  <i
                    class="fa-solid fa-check-circle text-green-600 dark:text-green-400 mr-2"
                  ></i>
                  KYC Verified
                </span>
              </div>
            </div> -->
          </div>

          <div class="p-2">
            <a
              href="/dashboard/account-settings.html"
              class="flex items-center space-x-3 px-3 py-2.5 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors group"
            >
              <div
                class="w-8 h-8 bg-gray-100 dark:bg-gray-700 rounded-xl flex items-center justify-center group-hover:bg-primary-100 dark:group-hover:bg-primary-900/30 transition-colors"
              >
                <i
                  class="fa-solid fa-user text-gray-500 dark:text-gray-400 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors text-sm"
                ></i>
              </div>
              <span
                class="text-sm font-medium text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white"
              >
                Profile Settings
              </span>
            </a>


            <div
              class="border-t border-gray-100 dark:border-gray-700 my-2"
            ></div>

            <button
              type="button"
              onclick="logout()"
              class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors group"
            >
              <div
                class="w-8 h-8 bg-red-100 dark:bg-red-900/30 rounded-xl flex items-center justify-center group-hover:bg-red-200 dark:group-hover:bg-red-900/50 transition-colors"
              >
                <i
                  class="fa-solid fa-right-from-bracket text-red-500 dark:text-red-400 text-sm"
                ></i>
              </div>
              <span class="text-sm font-medium text-red-600 dark:text-red-400"
                >Sign Out</span
              >
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
