<!-- components/mobile-header.html -->
<div class="lg:hidden" x-data="{ showMobileNotifications: false }">
  <!-- Header Section -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center space-x-2">
      <!-- Back Button -->
      <a
        href="index.html"
        class="w-10 h-10 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center backdrop-blur-sm transition-all duration-200 hover:bg-gray-200 dark:hover:bg-gray-700 mr-2"
      >
        <i
          class="fa-solid fa-arrow-left text-gray-700 dark:text-gray-300 text-base"
        ></i>
      </a>

      <div>
        <!-- Custom Title -->
        <p
          class="text-gray-900 dark:text-white font-semibold text-base"
          data-mobile-title
        >
          Transactions
        </p>
      </div>
    </div>

    <div class="flex items-center space-x-2">
      <!-- Dark Mode Toggle -->
      <button
        type="button"
        @click="toggleDarkMode()"
        class="w-10 h-10 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center backdrop-blur-sm transition-all duration-200 hover:bg-gray-200 dark:hover:bg-gray-700"
      >
        <i
          x-show="!darkMode"
          class="fa-solid fa-moon text-gray-700 text-base"
        ></i>
        <i
          x-show="darkMode"
          class="fa-solid fa-sun text-yellow-400 text-base"
        ></i>
      </button>

      <!-- Notifications -->
      <div class="relative">
        <button
          type="button"
          @click="
            showMobileNotifications = !showMobileNotifications;
            if (showMobileNotifications) window.loadNotifications && window.loadNotifications();
          "
          class="w-10 h-10 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center backdrop-blur-sm transition-all duration-200 hover:bg-gray-200 dark:hover:bg-gray-700"
        >
          <i
            class="fa-solid fa-bell text-gray-700 dark:text-gray-300 text-base"
          ></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Notifications Panel -->
  <div
    x-show="showMobileNotifications"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 -translate-y-4"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-4"
    class="fixed inset-0 z-50 bg-black/20 backdrop-blur-sm"
    @click="showMobileNotifications = false"
  >
    <div
      @click.stop
      class="absolute top-0 left-0 right-0 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 text-white rounded-b-3xl shadow-2xl dark:shadow-slate-900/50 max-h-[80vh] overflow-hidden"
    >
      <!-- Panel Header -->
      <div
        class="flex items-center justify-between p-4 border-b border-white/10 dark:border-white/20"
      >
        <div class="flex items-center space-x-3">
          <div
            class="w-10 h-10 bg-white/10 dark:bg-white/20 rounded-2xl flex items-center justify-center"
          >
            <i class="fa-solid fa-bell text-white text-sm"></i>
          </div>
          <div>
            <h3 class="text-lg font-bold text-white">Notifications</h3>
            <p class="text-xs text-white/60" data-notification-subtitle>
              Loading...
            </p>
          </div>
        </div>

        <button
          type="button"
          @click="showMobileNotifications = false"
          class="w-8 h-8 bg-white/10 dark:bg-white/20 rounded-xl flex items-center justify-center hover:bg-white/20 dark:hover:bg-white/30 transition-colors"
        >
          <i class="fa-solid fa-times text-white text-sm"></i>
        </button>
      </div>

      <!-- Notifications List -->
      <div
        class="overflow-y-auto max-h-96 custom-scrollbar"
        data-notification-list
      >
        <div class="p-6 text-center text-sm text-white/70">Loading...</div>
      </div>

      <!-- Footer Actions -->
      <div
        class="p-4 border-t border-white/10 dark:border-white/20 bg-white/5 dark:bg-white/10"
      >
        <div class="flex items-center justify-between">
          <button
            type="button"
            class="text-sm font-semibold text-white/70 dark:text-white/80 hover:text-white transition-colors"
            data-mark-all-read
          >
            Mark all as read
          </button>

          <a
            href="notifications.html"
            class="text-sm font-semibold text-primary-400 dark:text-primary-300 hover:text-primary-300 dark:hover:text-primary-200 transition-colors flex items-center"
          >
            View All
            <i class="fa-solid fa-arrow-right ml-1 text-xs"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
